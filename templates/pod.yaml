apiVersion: v1
kind: Pod
metadata:
  name: {{ .Values.image.name }}-template
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.global.labels.app }}
spec:
  restartPolicy: Never
  serviceAccountName: {{ .Values.serviceAccount.name }}
  {{- with .Values.image.imagePullSecrets }}
  imagePullSecrets:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  containers:
    - name: {{ .Values.image.name }}
      securityContext:
        capabilities:
          drop:
            - ALL
        runAsUser: 1001
        runAsNonRoot: true
        allowPrivilegeEscalation: false
      image: "{{ .Values.image.registry }}/{{ .Values.namespace }}/{{ .Values.image.name }}:{{ .Values.image.tag }}"
      imagePullPolicy: {{ .Values.image.pullPolicy }}
      resources:
        {{- toYaml .Values.resources | nindent 8 }}
      env:
        - name: AZP_URL
          valueFrom:
            secretKeyRef:
              name: {{ .Values.secret.name }}
              key: AZP_URL

        - name: AZP_TOKEN
          valueFrom:
            secretKeyRef:
              name: {{ .Values.secret.name }}
              key: AZP_TOKEN

        - name: AZP_POOL
          valueFrom:
            secretKeyRef:
              name: {{ .Values.secret.name }}
              key: AZP_POOL
        - name: AZP_AGENT_NAME
          value: "agents-template"
      terminationMessagePath: /dev/termination-log
      terminationMessagePolicy: File